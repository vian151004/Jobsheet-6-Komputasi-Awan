<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction - Vian Maulana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Aplikasi Prediksi Diabetes</h3>
                        <p class="mb-0">Vian Maulana Ramadhan - 4.33.24.0.26 (TI-2A)</p>
                    </div>
                    <div class="card-body p-4">
                        
                        {% if prediction_text %}
                            <div class="alert {{ alert_class }} text-center fw-bold fs-5" role="alert">
                                {{ prediction_text }}
                            </div>
                        {% endif %}

                        <form action="/predict" method="POST">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Pregnancies (Jumlah Kehamilan)</label>
                                    <input type="number" step="any" name="pregnancies" class="form-control" required placeholder="Contoh: 2">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Glucose (Glukosa Darah)</label>
                                    <input type="number" step="any" name="glucose" class="form-control" required placeholder="Contoh: 120">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Blood Pressure (Tekanan Darah)</label>
                                    <input type="number" step="any" name="bloodpressure" class="form-control" required placeholder="Contoh: 70">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Skin Thickness (Ketebalan Kulit)</label>
                                    <input type="number" step="any" name="skinthickness" class="form-control" required placeholder="Contoh: 20">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Insulin</label>
                                    <input type="number" step="any" name="insulin" class="form-control" required placeholder="Contoh: 79">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">BMI (Indeks Massa Tubuh)</label>
                                    <input type="number" step="any" name="bmi" class="form-control" required placeholder="Contoh: 32.5">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Diabetes Pedigree Function</label>
                                    <input type="number" step="any" name="dpf" class="form-control" required placeholder="Contoh: 0.45">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Age (Usia)</label>
                                    <input type="number" step="any" name="age" class="form-control" required placeholder="Contoh: 28">
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg w-100">Jalankan Prediksi</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
